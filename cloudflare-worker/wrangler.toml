name = "court-monitor-trigger"
main = "worker.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["45 3 * * 1-5"]  # 3:45 UTC = 6:45 МСК, пн-пт

# KV-хранилище push-подписок PWA.
# Создать namespace: wrangler kv namespace create PUSH_SUBSCRIPTIONS
# Вставить полученный id в поле id ниже, затем wrangler deploy.
[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "2ffe67ca59ce4bfe986f80d11df2ab39"
