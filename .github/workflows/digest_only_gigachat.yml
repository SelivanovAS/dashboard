name: Digest Only (GigaChat)

on:
  workflow_dispatch:  # Только ручной запуск
    inputs:
      replay_last:
        description: 'Переиграть последний сохранённый дайджест (data/last_digest_context.json). Снять галку — прогнать по текущему CSV без изменений (обычно «всё спокойно»).'
        required: false
        type: boolean
        default: true
      to_group:
        description: 'Отправить дайджест в корпоративную группу (TELEGRAM_CHAT_ID). Снять галку — в личный чат.'
        required: false
        type: boolean
        default: false  # digest_only — для проверки, по умолчанию в личный чат
      model:
        description: 'Модель GigaChat'
        required: false
        type: choice
        default: GigaChat-2-Max
        options:
          - GigaChat-2-Max
          - GigaChat-2-Pro
          - GigaChat-2
          - GigaChat

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate and send digest (GigaChat)
        env:
          LLM_PROVIDER: gigachat
          GIGACHAT_AUTH_KEY: ${{ secrets.GIGACHAT_AUTH_KEY }}
          GIGACHAT_SCOPE: GIGACHAT_API_PERS
          GIGACHAT_MODEL: ${{ inputs.model }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.to_group && secrets.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID_TEST }}
          # Push в этом workflow идёт только устройству-владельцу (см. send_web_push owner_only=True).
          PUSH_WORKER_URL: ${{ secrets.PUSH_WORKER_URL }}
          PUSH_SECRET: ${{ secrets.PUSH_SECRET }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          if [ "${{ inputs.to_group }}" = "true" ]; then
            echo "📢 GROUP CHAT: digest will go to corporate group"
          else
            echo "📱 PERSONAL CHAT: digest will go to personal chat"
          fi
          if [ "${{ inputs.replay_last }}" = "true" ]; then
            echo "🔁 REPLAY: using data/last_digest_context.json"
            python scripts/update_cases.py --replay-last
          else
            echo "📭 DIGEST-ONLY: current CSV, no changes"
            python scripts/update_cases.py --digest-only
          fi
