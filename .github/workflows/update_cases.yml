name: Update Court Cases

on:
  workflow_dispatch:  # Запуск через Cloudflare Worker (cron) или вручную из UI
    inputs:
      to_group:
        description: 'Отправить дайджест в корпоративную группу (TELEGRAM_CHAT_ID). Снять галку — в личный чат.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run court monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # По умолчанию шлём в личный чат (TELEGRAM_CHAT_ID_TEST). Cloudflare Worker
          # дёргает workflow_dispatch без inputs → default to_group=false → личный чат.
          # Чтобы продублировать в корпоративную группу — поставить галку to_group в UI.
          TELEGRAM_CHAT_ID: ${{ inputs.to_group && secrets.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID_TEST }}
          # Web Push PWA-уведомления (опционально — если не заданы, пропускаются).
          PUSH_WORKER_URL: ${{ secrets.PUSH_WORKER_URL }}
          PUSH_SECRET: ${{ secrets.PUSH_SECRET }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          if [ "${{ inputs.to_group }}" = "true" ]; then
            echo "📢 GROUP CHAT: digest will go to corporate group"
          else
            echo "📱 PERSONAL CHAT: digest will go to personal chat"
          fi
          python scripts/update_cases.py --json

      - name: Commit updated data
        run: |
          git config user.name "Court Monitor Bot"
          git config user.email "bot@court-monitor.local"
          git add data/sberbank_cases.csv data/.digested_acts data/cases.json
          if [ -f data/sberbank_cases_archive.csv ]; then
            git add data/sberbank_cases_archive.csv
          fi
          if [ -f data/cases_archive.json ]; then
            git add data/cases_archive.json
          fi
          # Контекст дайджеста нужен workflow `Digest Only` (--replay-last).
          # Без коммита каждый следующий запуск видит пустой checkout и падает.
          if [ -f data/last_digest_context.json ]; then
            git add data/last_digest_context.json
          fi
          # Готовый HTML дайджеста для блока «📰 Дайджест» на сайте (читает app.js).
          # Без коммита GitHub Pages обслуживает старую версию.
          if [ -f data/last_digest.json ]; then
            git add data/last_digest.json
          fi
          git diff --cached --quiet || git commit -m "📊 Обновление данных $(date +'%d.%m.%Y %H:%M')"
          git push
