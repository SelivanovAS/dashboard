name: Update Court Cases

on:
  workflow_dispatch:  # Запуск через Cloudflare Worker (cron) или вручную из UI
    inputs:
      test_mode:
        description: 'Отправить дайджест в личный чат (TELEGRAM_CHAT_ID_TEST), а не в группу'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run court monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # При test_mode=true (галка в UI «Run workflow») шлём в личный чат.
          # Cloudflare Worker дёргает workflow_dispatch без inputs → default=false → группа.
          TELEGRAM_CHAT_ID: ${{ inputs.test_mode && secrets.TELEGRAM_CHAT_ID_TEST || secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ inputs.test_mode }}" = "true" ]; then
            echo "🧪 TEST MODE: digest will go to personal chat"
          else
            echo "📢 PROD MODE: digest will go to group chat"
          fi
          python scripts/update_cases.py --json

      - name: Commit updated data
        # В тест-режиме не коммитим: иначе тестовый прогон может «съесть»
        # изменения, которые prod-крон должен был обработать сам.
        if: ${{ !inputs.test_mode }}
        run: |
          git config user.name "Court Monitor Bot"
          git config user.email "bot@court-monitor.local"
          git add data/sberbank_cases.csv data/.digested_acts data/cases.json
          if [ -f data/sberbank_cases_archive.csv ]; then
            git add data/sberbank_cases_archive.csv
          fi
          if [ -f data/cases_archive.json ]; then
            git add data/cases_archive.json
          fi
          git diff --cached --quiet || git commit -m "📊 Обновление данных $(date +'%d.%m.%Y %H:%M')"
          git push
