name: Обновление дел Сбербанка

on:
  schedule:
    # 07:00 UTC = 10:00 МСК (зимнее время) / 12:00 МСК+5 (ХМАО)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Ручной запуск через GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей
        run: pip install -r scripts/requirements.txt

      - name: Запуск скрипта обновления
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CSV_PATH: data/sberbank_cases.csv
        run: python scripts/update_cases.py

      - name: Коммит обновлённого CSV
        run: |
          git config user.name "Court Monitor Bot"
          git config user.email "bot@github-actions"
          git add data/sberbank_cases.csv
          # Коммитим только если есть изменения
          git diff --staged --quiet || git commit -m "🔄 Обновление дел $(date +'%d.%m.%Y %H:%M')"
          git push
