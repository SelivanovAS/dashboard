name: Update Court Cases

on:
  workflow_dispatch:  # Запуск через cron-job.org или вручную

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run court monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/update_cases.py --json

      - name: Commit updated data
        run: |
          git config user.name "Court Monitor Bot"
          git config user.email "bot@court-monitor.local"
          git add data/sberbank_cases.csv data/.digested_acts data/cases.json
          if [ -f data/sberbank_cases_archive.csv ]; then
            git add data/sberbank_cases_archive.csv
          fi
          if [ -f data/cases_archive.json ]; then
            git add data/cases_archive.json
          fi
          git diff --cached --quiet || git commit -m "📊 Обновление данных $(date +'%d.%m.%Y %H:%M')"
          git push
