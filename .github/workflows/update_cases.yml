name: Update Court Cases

on:
  schedule:
    - cron: '50 3 * * *'  # 6:50 МСК (UTC+3)
  workflow_dispatch:  # Ручной запуск

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run court monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/update_cases.py

      - name: Commit updated CSV
        run: |
          git config user.name "Court Monitor Bot"
          git config user.email "bot@court-monitor.local"
          git add data/sberbank_cases.csv
          git diff --cached --quiet || git commit -m "📊 Обновление данных $(date +'%d.%m.%Y %H:%M')"
          git push
