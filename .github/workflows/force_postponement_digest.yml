name: Force Postponement Digest

on:
  workflow_dispatch:
    inputs:
      case_number:
        description: 'Номер дела (например, 33-1052/2026)'
        required: true
        type: string
      old_date:
        description: 'Старая дата заседания (ДД.ММ.ГГГГ)'
        required: true
        type: string
      old_time:
        description: 'Старое время заседания (HH:MM), опционально'
        required: false
        type: string
        default: ''
      test_mode:
        description: 'Отправить дайджест в личный чат (TELEGRAM_CHAT_ID_TEST), а не в группу'
        required: false
        type: boolean
        default: true  # обычно дёргают для проверки — по умолчанию в личку

jobs:
  force-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Send postponement digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.test_mode && secrets.TELEGRAM_CHAT_ID_TEST || secrets.TELEGRAM_CHAT_ID }}
          INPUT_CASE_NUMBER: ${{ inputs.case_number }}
          INPUT_OLD_DATE: ${{ inputs.old_date }}
          INPUT_OLD_TIME: ${{ inputs.old_time }}
        run: |
          if [ "${{ inputs.test_mode }}" = "true" ]; then
            echo "🧪 TEST MODE: digest will go to personal chat"
          else
            echo "📢 PROD MODE: digest will go to group chat"
          fi
          python scripts/update_cases.py \
            --force-digest-for "$INPUT_CASE_NUMBER" \
            --old-date "$INPUT_OLD_DATE" \
            --old-time "$INPUT_OLD_TIME"
