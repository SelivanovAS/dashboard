name: Force Postponement Digest

on:
  workflow_dispatch:
    inputs:
      case_number:
        description: 'Номер дела (например, 33-1052/2026)'
        required: true
        type: string
      old_date:
        description: 'Старая дата заседания (ДД.ММ.ГГГГ)'
        required: true
        type: string
      old_time:
        description: 'Старое время заседания (HH:MM), опционально'
        required: false
        type: string
        default: ''
      to_group:
        description: 'Отправить дайджест в корпоративную группу (TELEGRAM_CHAT_ID). Снять галку — в личный чат.'
        required: false
        type: boolean
        default: false  # обычно дёргают для проверки — по умолчанию в личный чат

jobs:
  force-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Send postponement digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.to_group && secrets.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID_TEST }}
          # Push в этом workflow идёт только устройству-владельцу (см. send_web_push owner_only=True).
          PUSH_WORKER_URL: ${{ secrets.PUSH_WORKER_URL }}
          PUSH_SECRET: ${{ secrets.PUSH_SECRET }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          INPUT_CASE_NUMBER: ${{ inputs.case_number }}
          INPUT_OLD_DATE: ${{ inputs.old_date }}
          INPUT_OLD_TIME: ${{ inputs.old_time }}
        run: |
          if [ "${{ inputs.to_group }}" = "true" ]; then
            echo "📢 GROUP CHAT: digest will go to corporate group"
          else
            echo "📱 PERSONAL CHAT: digest will go to personal chat"
          fi
          python scripts/update_cases.py \
            --force-digest-for "$INPUT_CASE_NUMBER" \
            --old-date "$INPUT_OLD_DATE" \
            --old-time "$INPUT_OLD_TIME"
