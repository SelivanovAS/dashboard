<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мониторинг судебных дел — ПАО Сбербанк — Апелляция ХМАО</title>
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,600;7..72,700&family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy-900: #0c1829; --navy-800: #132238; --navy-700: #1a3050;
  --navy-600: #234068; --navy-500: #2d5480;
  --gold-500: #d4a853; --gold-400: #e4be6a; --gold-300: #f0d590;
  --amber-500: #f59e0b; --amber-600: #d97706; --amber-100: #fef3c7;
  --green-500: #10b981; --green-100: #d1fae5; --green-800: #065f46;
  --red-500: #ef4444; --red-100: #fee2e2; --red-800: #991b1b;
  --blue-100: #dbeafe; --blue-500: #3b82f6; --blue-800: #1e40af;
  --purple-100: #f3e8ff; --purple-800: #6b21a8;
  --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
  --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
  --slate-600: #475569; --slate-700: #334155; --slate-800: #1e293b;
  --white: #ffffff;
  --font-display: 'Literata', Georgia, serif;
  --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Consolas', monospace;
  --shadow-sm: 0 1px 2px rgba(12,24,41,0.05);
  --shadow-md: 0 4px 12px rgba(12,24,41,0.08);
  --shadow-lg: 0 12px 40px rgba(12,24,41,0.12);
  --radius: 8px; --radius-lg: 12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--slate-50);color:var(--slate-800);min-height:100vh;-webkit-font-smoothing:antialiased;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
@keyframes newHighlight{0%{background:rgba(245,158,11,.08);}50%{background:rgba(245,158,11,.14);}100%{background:rgba(245,158,11,.08);}}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px;}
.loading-spinner{width:40px;height:40px;border:3px solid var(--slate-200);border-top-color:var(--navy-700);border-radius:50%;animation:spin .8s linear infinite;}
.loading-text{font-size:14px;color:var(--slate-500);animation:pulse 1.5s ease infinite;}

/* Setup */
/* setup styles removed — data loads from GitHub */

/* Header */
.app-header{background:linear-gradient(135deg,var(--navy-900),var(--navy-700));padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(12,24,41,.3);}
.header-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:16px 0;}
.header-brand{display:flex;align-items:center;gap:14px;}
.header-logo{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--gold-500),var(--gold-300));display:flex;align-items:center;justify-content:center;color:var(--navy-900);font-weight:700;font-size:18px;font-family:var(--font-display);}
.header-title{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--white);letter-spacing:-.01em;}
.header-sub{font-size:12px;color:var(--gold-300);margin-top:1px;font-weight:300;letter-spacing:.03em;}
.header-actions{display:flex;align-items:center;gap:12px;}
.header-meta{font-size:11px;color:var(--slate-400);text-align:right;}
.btn-refresh{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(212,168,83,.15);color:var(--gold-400);border:1px solid rgba(212,168,83,.3);border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-refresh:hover{background:rgba(212,168,83,.25);}
.btn-refresh svg{width:14px;height:14px;}
.btn-refresh.is-loading svg{animation:spin .8s linear infinite;}

/* Main */
.app-main{max-width:1400px;margin:0 auto;padding:24px 32px 40px;}

/* ========== Stats — primary row ========== */
.stats-primary{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:12px;animation:fadeUp .4s ease;}
.stat-card{background:var(--white);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm);border-left:3px solid var(--slate-300);transition:transform .15s,box-shadow .15s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.stat-card[data-accent="blue"]{border-left-color:var(--navy-600);}
.stat-card[data-accent="green"]{border-left-color:var(--green-500);}
.stat-card[data-accent="gold"]{border-left-color:var(--gold-500);}
.stat-card[data-accent="red"]{border-left-color:var(--red-500);}
.stat-value{font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:-.02em;}
.stat-label{font-size:11px;color:var(--slate-500);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
/* Win-rate progress bar */
.stat-progress{margin-top:8px;height:5px;border-radius:3px;background:var(--slate-100);overflow:hidden;}
.stat-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green-500),var(--gold-500));transition:width .6s ease;}

/* Stats secondary — compact row */
.stats-secondary{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;padding:0 2px;animation:fadeUp .45s ease;}
.stat-chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--slate-600);}
.stat-chip .chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stat-chip strong{font-weight:700;color:var(--slate-800);}

/* ========== Category mini-chart ========== */
.analytics-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;animation:fadeUp .5s ease;}
.analytics-card{background:var(--white);border-radius:var(--radius-lg);padding:18px 22px;box-shadow:var(--shadow-sm);}
.analytics-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--slate-500);margin-bottom:14px;}
.cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px;}
.cat-bar-row:last-child{margin-bottom:0;}
.cat-bar-label{width:180px;flex-shrink:0;color:var(--slate-700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-bar-track{flex:1;height:8px;background:var(--slate-100);border-radius:4px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.cat-bar-count{width:24px;text-align:right;font-weight:600;color:var(--slate-600);font-family:var(--font-mono);font-size:11px;}

/* Upcoming hearings */
.upcoming-list{display:flex;flex-direction:column;gap:10px;}
.upcoming-item{display:flex;align-items:flex-start;gap:12px;font-size:13px;}
.upcoming-date{min-width:80px;font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--navy-700);padding:3px 8px;background:var(--slate-50);border-radius:4px;text-align:center;flex-shrink:0;}
.upcoming-info{color:var(--slate-700);line-height:1.4;}
.upcoming-case{font-weight:600;color:var(--navy-800);}
.upcoming-empty{font-size:13px;color:var(--slate-400);text-align:center;padding:20px 0;}

/* ========== Toolbar ========== */
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;animation:fadeUp .5s ease;}
.toolbar-left{display:flex;gap:8px;align-items:center;flex:1;flex-wrap:wrap;}
.toolbar-right{display:flex;gap:8px;align-items:center;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--slate-200);border-radius:var(--radius);padding:7px 12px;min-width:220px;flex:0 1 280px;transition:border-color .2s;position:relative;}
.search-box:focus-within{border-color:var(--navy-500);}
.search-box svg{width:15px;height:15px;color:var(--slate-400);flex-shrink:0;}
.search-input{border:none;outline:none;background:transparent;font-size:13px;color:var(--slate-800);flex:1;font-family:var(--font-body);}
.search-input::placeholder{color:var(--slate-400);}
.search-clear{display:none;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:none;background:var(--slate-200);color:var(--slate-600);font-size:12px;cursor:pointer;line-height:1;padding:0;transition:background .15s;}
.search-clear:hover{background:var(--slate-300);}
.search-clear.visible{display:flex;}
.filter-select{padding:7px 10px;border:1px solid var(--slate-200);border-radius:var(--radius);font-size:12px;background:var(--white);color:var(--slate-700);cursor:pointer;font-family:var(--font-body);transition:border-color .2s;}
.filter-select:focus{outline:none;border-color:var(--navy-500);}
.btn-outline{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--white);border:1px solid var(--slate-200);border-radius:var(--radius);font-size:12px;cursor:pointer;color:var(--slate-600);font-weight:600;transition:all .15s;}
.btn-outline:hover{border-color:var(--slate-400);background:var(--slate-50);}
.btn-outline svg{width:14px;height:14px;}

/* Table counter (above table) */
.table-counter{font-size:12px;color:var(--slate-500);margin-bottom:8px;animation:fadeUp .55s ease;}
.table-counter strong{color:var(--slate-700);}

/* ========== Error / Banners ========== */
.error-banner{background:var(--red-100);border:1px solid #fecaca;border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;font-size:13px;color:var(--red-800);}
.new-cases-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #fcd34d;border-radius:var(--radius);padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e;animation:fadeUp .4s ease;cursor:pointer;transition:box-shadow .2s;}
.new-cases-banner:hover{box-shadow:0 2px 8px rgba(245,158,11,.2);}
.new-cases-banner svg{width:18px;height:18px;flex-shrink:0;}
.new-cases-banner strong{font-weight:700;}
.new-cases-banner .banner-hint{font-size:11px;opacity:.7;margin-left:4px;}
.new-cases-banner .dismiss{margin-left:auto;background:none;border:none;color:#92400e;cursor:pointer;font-size:16px;opacity:.6;transition:opacity .15s;padding:4px;}
.new-cases-banner .dismiss:hover{opacity:1;}

/* ========== Table ========== */
.table-wrap{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);overflow:hidden;animation:fadeUp .6s ease;}
.table-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:12px 14px;background:var(--slate-50);border-bottom:2px solid var(--slate-200);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--slate-500);font-weight:700;white-space:nowrap;user-select:none;transition:color .15s;}
thead th.sortable{cursor:pointer;}
thead th.sortable:hover{color:var(--navy-700);}
thead th.sorted{color:var(--navy-800);}
.sort-icon{display:inline-block;margin-left:4px;font-size:10px;}
tbody tr{border-bottom:1px solid var(--slate-100);transition:background .1s;}
tbody tr.row-clickable{cursor:pointer;}
tbody tr:hover{background:var(--slate-50);}
tbody tr.row-clickable:hover{background:#f0f4ff;}
tbody td{padding:12px 14px;vertical-align:top;}
.case-number{font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--navy-800);display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.court-label{font-size:11px;color:var(--slate-400);margin-top:3px;}
.parties-col{display:flex;flex-direction:column;gap:2px;font-size:12.5px;min-width:200px;}
.party-tag{font-size:10px;font-weight:700;color:var(--slate-400);margin-right:3px;}
.party-sberbank{color:var(--gold-500);font-weight:600;}
.event-cell{max-width:260px;}
.event-text{font-size:12px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;}
.event-text[title]{cursor:help;}
.event-date{font-size:11px;color:var(--slate-400);margin-top:2px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-active{background:#fef3c7;color:#92400e;}
.badge-decided{background:var(--green-100);color:var(--green-800);}
.badge-plaintiff{background:var(--blue-100);color:var(--blue-800);}
.badge-defendant{background:#fce7f3;color:#9d174d;}
.badge-third{background:var(--slate-100);color:var(--slate-600);}
.badge-upheld{background:var(--slate-100);color:var(--slate-600);}
.badge-reversed{background:var(--slate-100);color:var(--slate-600);}
.badge-partial{background:#fef3c7;color:#92400e;}
.badge-returned{background:#e0e7ff;color:#3730a3;}
.badge-dismissed{background:var(--slate-100);color:var(--slate-600);}
.badge-pending{background:var(--slate-100);color:var(--slate-500);}
/* Dynamic result colors based on favorability for bank */
.badge-favorable{background:var(--green-100);color:var(--green-800);}
.badge-unfavorable{background:var(--red-100);color:var(--red-800);}
.badge-neutral-result{background:var(--slate-100);color:var(--slate-600);}
.badge-cat{background:var(--slate-100);color:var(--slate-700);font-weight:400;border-radius:4px;font-size:10px;}
.badge-act{display:inline-block;padding:1px 6px;border-radius:3px;background:var(--blue-100);color:var(--blue-800);font-size:10px;margin-top:4px;font-weight:600;}
.badge-act-no{display:inline-block;padding:1px 6px;border-radius:3px;background:var(--slate-100);color:var(--slate-500);font-size:10px;margin-top:4px;}
/* Cat+Role merged column */
.cat-role-cell{display:flex;flex-direction:column;gap:3px;}
.cat-role-cell .badge{font-size:10px;padding:2px 7px;}
/* Next date column */
.next-date-val{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--navy-800);}
.next-date-label{font-size:10px;color:var(--slate-400);margin-top:1px;}
.next-date-warn{color:var(--amber-600);font-style:italic;font-size:11px;}
/* Court column */
.court-cell{font-size:11.5px;color:var(--slate-700);line-height:1.35;}
/* Result cell with act info */
.result-cell{display:flex;flex-direction:column;gap:2px;}
.badge-icon{font-size:11px;line-height:1;}
.badge-new{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap;}
.badge-archived{background:var(--slate-200);color:var(--slate-500);font-size:9px;padding:2px 7px;border-radius:8px;font-weight:600;text-transform:uppercase;}

/* Row new — animate for 5s then static */
tbody tr.row-new{animation:newHighlight 2s ease 3;background:rgba(245,158,11,.06);}
tbody tr.row-new:hover{background:rgba(245,158,11,.12);}

/* ========== Expandable row ========== */
.expand-btn{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border:1px solid var(--slate-200);border-radius:4px;background:var(--white);cursor:pointer;color:var(--slate-500);font-size:12px;transition:all .15s;flex-shrink:0;margin-right:6px;}
.expand-btn:hover{background:var(--slate-50);border-color:var(--slate-300);}
.expand-btn.open{background:var(--navy-800);color:var(--gold-400);border-color:var(--navy-800);}
tr.detail-row{display:none;}
tr.detail-row.open{display:table-row;}
tr.detail-row td{padding:0 14px 14px 52px;background:var(--slate-50);border-bottom:1px solid var(--slate-200);}
.detail-content{display:flex;flex-wrap:wrap;gap:20px;font-size:12.5px;color:var(--slate-700);line-height:1.6;padding-top:4px;}
.detail-block{flex:1;min-width:200px;}
.detail-block-title{font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--slate-400);margin-bottom:4px;}
.detail-link{display:inline-flex;align-items:center;gap:4px;color:var(--navy-600);text-decoration:none;font-weight:600;font-size:12px;margin-top:6px;transition:color .15s;}
.detail-link:hover{color:var(--gold-500);}
.detail-link svg{width:12px;height:12px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--slate-400);}
.empty-state svg{width:40px;height:40px;margin-bottom:12px;opacity:.4;}
.empty-state p{font-size:14px;}

.app-footer{max-width:1400px;margin:0 auto;padding:16px 32px;text-align:center;font-size:11px;color:var(--slate-400);border-top:1px solid var(--slate-200);}

/* ========== Mobile cards ========== */
.mobile-cards{display:none;}
.mobile-card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:10px;border-left:3px solid var(--slate-200);transition:box-shadow .15s;}
.mobile-card:active{box-shadow:var(--shadow-md);}
.mobile-card[data-role="plaintiff"]{border-left-color:var(--blue-500);}
.mobile-card[data-role="defendant"]{border-left-color:#ec4899;}
.mobile-card.card-new{border-left-color:var(--amber-500);background:rgba(245,158,11,.03);}
.mc-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;}
.mc-case{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--navy-800);}
.mc-parties{font-size:12px;color:var(--slate-600);margin-bottom:8px;line-height:1.5;}
.mc-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.mc-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--slate-400);margin-top:6px;padding-top:8px;border-top:1px solid var(--slate-100);}
.mc-event{font-size:11.5px;color:var(--slate-600);line-height:1.4;}
.mc-link{display:flex;align-items:center;gap:4px;color:var(--navy-600);text-decoration:none;font-size:11px;font-weight:600;}

/* ========== Responsive ========== */
@media(max-width:1024px){
  .stats-primary{grid-template-columns:repeat(2,1fr);}
  .analytics-row{grid-template-columns:1fr;}
}
@media(max-width:768px){
  .app-header{padding:0 16px;}.app-main{padding:16px;}
  .header-inner{flex-direction:column;align-items:flex-start;gap:10px;padding:14px 0;}
  .header-actions{width:100%;justify-content:space-between;}
  .stats-primary{grid-template-columns:repeat(2,1fr);gap:8px;}
  .analytics-row{grid-template-columns:1fr;gap:8px;}
  .toolbar{flex-direction:column;align-items:stretch;}
  .toolbar-left{flex-direction:column;}.search-box{flex:1;min-width:auto;}
  .toolbar-right{justify-content:flex-end;}
  .table-wrap{display:none;}
  .mobile-cards{display:block;animation:fadeUp .6s ease;}
}
</style>
</head>
<body>

<div id="loading-screen" class="loading-screen" style="display:none;">
  <div class="loading-spinner"></div>
  <div class="loading-text">Загрузка данных из таблицы...</div>
</div>

<div id="app" style="display:none;">
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo">&#9878;</div>
        <div>
          <div class="header-title">Мониторинг судебных дел</div>
          <div class="header-sub">Суд ХМАО — Югры &middot; Апелляция &middot; ПАО Сбербанк</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="header-meta" id="meta-info"></div>
        <button class="btn-refresh" id="btn-refresh" onclick="refreshData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Обновить
        </button>

      </div>
    </div>
  </header>

  <main class="app-main">
    <div id="new-cases-banner" class="new-cases-banner" style="display:none;" onclick="filterNewCases(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span id="new-cases-text"></span>
      <span class="banner-hint">Нажмите, чтобы отфильтровать</span>
      <button class="dismiss" onclick="dismissNewBanner(event)" title="Скрыть">&times;</button>
    </div>
    <div id="error-banner" class="error-banner" style="display:none;"></div>

    <!-- Primary stats -->
    <div class="stats-primary" id="stats-primary"></div>
    <!-- Secondary stats -->
    <div class="stats-secondary" id="stats-secondary"></div>

    <!-- Analytics row -->
    <div class="analytics-row" id="analytics-row"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-box">

const STATUS_MAP={'в производстве':'active','решено':'decided'};
const STATUS_LABELS={active:'В производстве',decided:'Решено'};
function normalizeResult(raw){
  if(!raw)return 'pending';
  const s=raw.toLowerCase().trim();
  if(s==='ожидается'||s==='')return 'pending';
  if(/оставлен\S?\s+без\s+изменен/i.test(s))return 'upheld';
  if(/отменен\S?\s+полностью|отменен\S?\s+с\s/i.test(s))return 'reversed';
  if(/отменен\S?\s+в\s+части|изменен/i.test(s))return 'partial';
  if(/снято\s+с\s+рассмотрен|прекращен/i.test(s))return 'dismissed';
  if(/возвращен|жалоб\S+.*возвращен/i.test(s))return 'returned';
  if(/удовлетворен\S?\s+частично/i.test(s))return 'partial';
  if(/удовлетворен/i.test(s))return 'reversed';
  if(/отказано/i.test(s))return 'upheld';
  if(/отменен/i.test(s))return 'reversed';
  return 'pending';
}
const RESULT_LABELS={upheld:'Оставлено без изменения',reversed:'Отменено',partial:'Изменено частично',returned:'Возвращено',dismissed:'Прекращено',pending:'Ожидается'};
const RESULT_ICONS={upheld:'✓',reversed:'✕',partial:'◐',returned:'↩',dismissed:'—',pending:'…'};
const APPELLANT_MAP={'банк':'bank','сбербанк':'bank','пао сбербанк':'bank','иное лицо':'other','другая сторона':'other','ответчик':'other','истец':'other'};
const CAT_COLORS=['#2d5480','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#64748b'];

let allCases=[],filteredCases=[],sortField='dateReceived',sortDir='desc';
let newCaseNumbers=new Set();
let archivedCount=0;
let expandedRows=new Set();

/* ========== CSV Parsing ========== */
function parseCSV(t){const r=[[]];let cur='',inQ=false;for(let i=0;i<t.length;i++){const c=t[i];if(c==='"'){if(inQ&&t[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){r[r.length-1].push(cur);cur='';}else if((c==='\n'||c==='\r')&&!inQ){if(c==='\r'&&t[i+1]==='\n')i++;r[r.length-1].push(cur);cur='';r.push([]);}else cur+=c;}r[r.length-1].push(cur);return r.filter(x=>x.length>1||(x.length===1&&x[0].trim()!==''));}

function rowToCase(h,row){
  const g=(ns)=>{for(const n of ns){const i=h.findIndex(x=>x.toLowerCase().includes(n.toLowerCase()));if(i>=0&&row[i])return row[i].trim();}return '';};
  const rl=g(['роль банка','роль']).toLowerCase(),sl=g(['статус']).toLowerCase(),rs=g(['результат']).toLowerCase(),ac=g(['акт опубликован','акт']).toLowerCase();
  const apellRaw=g(['апеллянт','кто подал жалобу','податель жалобы']).toLowerCase();
  const actDateRaw=g(['дата публикации акта','дата акта']);
  let link=g(['ссылка','url','link']);
  if(link){
    const pipeMatch=link.match(/^(\d+)\|([a-f0-9-]+)$/);
    if(pipeMatch){link='https://oblsud--hmao.sudrf.ru/modules.php?name=sud_delo&srv_num=1&name_op=case&case_id='+pipeMatch[1]+'&case_uid='+pipeMatch[2]+'&delo_id=5&new=5';}
    else if(/^\d+$/.test(link)){link='https://oblsud--hmao.sudrf.ru/modules.php?name=sud_delo&srv_num=1&name_op=case&case_id='+link+'&delo_id=5&new=5';}
  }
  const evText=g(['последнее событие','событие']);
  // Try to determine appellant from explicit column or event text
  let appellant=APPELLANT_MAP[apellRaw]||'';
  if(!appellant&&evText){
    const evLow=evText.toLowerCase();
    if(/жалоб[аы]?.{0,5}(сбербанк|пао сбер)/i.test(evText))appellant='bank';
    else if(/жалоб[аы]?.{0,30}(истц|ответчик|заявител)/i.test(evText)&&!/сбербанк|пао сбер/i.test(evText))appellant='other';
  }
  // Extract next important date from event text
  let nextDate='',nextDateLabel='';
  if(evText){
    const evLow=evText.toLowerCase();
    const dateMatch=evText.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
    if(dateMatch){
      const extractedDate=`${dateMatch[3]}-${dateMatch[2].padStart(2,'0')}-${dateMatch[1].padStart(2,'0')}`;
      if(evLow.includes('назначен')||evLow.includes('заседан'))
        {nextDate=extractedDate;nextDateLabel='Заседание';}
      else if(evLow.includes('рассмотрен')&&evLow.includes('отложен'))
        {nextDate=extractedDate;nextDateLabel='Отложено до';}
      else if(evLow.includes('без движения')||evLow.includes('оставлен'))
        {nextDate=extractedDate;nextDateLabel='Без движения до';}
      else if(evLow.includes('рассмотрен'))
        {nextDate=extractedDate;nextDateLabel='Рассмотрение';}
      else
        {nextDate=extractedDate;nextDateLabel='Событие';}
    }
  }
  return{caseNumber:g(['номер дела','номер','дело']),dateReceived:parseDate(g(['дата поступления','поступило'])),plaintiff:g(['истец']),defendant:g(['ответчик']),category:g(['категория']),firstInstanceCourt:g(['суд 1 инстанции','суд первой','суд 1']),sberbankRole:ROLE_MAP[rl]||rl||'defendant',status:STATUS_MAP[sl]||sl||'active',lastEvent:evText,lastEventDate:parseDate(g(['дата события'])),hasPublishedActs:ac==='да'||ac==='true'||ac==='1',actDate:parseDate(actDateRaw),result:normalizeResult(rs),resultRaw:rs,link:link,notes:g(['заметки','примечан']),appellant:appellant,nextDate:nextDate,nextDateLabel:nextDateLabel};
}
function parseDate(s){if(!s)return '';const m=s.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);if(m)return`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);return s;}
function formatDate(d){if(!d)return'—';try{const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString('ru-RU');}catch{return d;}}
function escHtml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isSberbank(s){return/сбербанк|ПАО Сбер/i.test(s);}

/* Determine if result is favorable for the bank */
/* Logic:
   - If bank filed the appeal (appellant='bank'):
     - reversed/partial = favorable (green), upheld = unfavorable (red)
   - If other party filed (appellant='other'):
     - upheld = favorable (green), reversed = unfavorable (red)
   - If bank is third party or appellant unknown: neutral
   - pending/returned/dismissed: always neutral
*/
function getResultFavor(c){
  if(!c.result||c.result==='pending'||c.result==='returned'||c.result==='dismissed')return 'neutral';
  if(c.sberbankRole==='third_party')return 'neutral';
  const app=c.appellant;
  if(!app)return 'neutral';
  if(app==='bank'){
    if(c.result==='reversed'||c.result==='partial')return 'favorable';
    if(c.result==='upheld')return 'unfavorable';
  }else if(app==='other'){
    if(c.result==='upheld')return 'favorable';
    if(c.result==='reversed'||c.result==='partial')return 'unfavorable';
  }
  return 'neutral';
}
function getResultBadgeClass(c){
  const f=getResultFavor(c);
  if(f==='favorable')return 'badge-favorable';
  if(f==='unfavorable')return 'badge-unfavorable';
  return 'badge-neutral-result';
}

const DEMO_CSV=`Номер дела,Дата поступления,Истец,Ответчик,Категория,Суд 1 инстанции,Роль банка,Статус,Последнее событие,Дата события,Акт опубликован,Результат,Ссылка,Заметки,Апеллянт,Дата публикации акта

33-750/2026,28.12.2025,ОАО Газпром,ПАО Сбербанк,Банковская гарантия,Сургутский городской суд,Ответчик,Решено,Вынесено определение 10.01.2026,10.01.2026,Нет,Отменено,,,Банк,`;

function init(){loadFromSheet(DATA_URL);}
function showLoading(){document.getElementById('loading-screen').style.display='';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('loading-screen').style.display='none';document.getElementById('app').style.display='';}
function loadDemo(){const rows=parseCSV(DEMO_CSV);allCases=rows.slice(1).map(r=>rowToCase(rows[0],r)).filter(c=>c.caseNumber);showApp();renderAll();}

async function loadFromSheet(url){
  showLoading();
  const btn=document.getElementById('btn-refresh');
  if(btn)btn.classList.add('is-loading');
  try{
    const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);
    const t=await r.text();const rows=parseCSV(t);
    if(rows.length<2)throw new Error('Таблица пуста');
    allCases=rows.slice(1).map(x=>rowToCase(rows[0],x)).filter(c=>c.caseNumber);
    showApp();hideError();renderAll();
  }catch(e){
    console.warn('Ошибка загрузки:',e.message);
    const rows=parseCSV(DEMO_CSV);allCases=rows.slice(1).map(r=>rowToCase(rows[0],r)).filter(c=>c.caseNumber);
    showApp();showError('Не удалось загрузить данные из GitHub ('+e.message+'). Показаны встроенные данные.');renderAll();
  }finally{
    if(btn)btn.classList.remove('is-loading');
  }
}
function refreshData(){loadFromSheet(DATA_URL+'?t='+Date.now());}
function showError(m){const e=document.getElementById('error-banner');e.style.display='';e.innerHTML='<strong>Ошибка:</strong> '+m;}
function hideError(){document.getElementById('error-banner').style.display='none';}

/* ========== Render All ========== */
function renderAll(){
  const knownRaw=localStorage.getItem(KNOWN_CASES_KEY);
  const knownSet=knownRaw?new Set(JSON.parse(knownRaw)):new Set();
  const currentNumbers=allCases.map(c=>c.caseNumber);
  if(knownSet.size>0){newCaseNumbers=new Set(currentNumbers.filter(n=>!knownSet.has(n)));}
  else{newCaseNumbers=new Set();}
  localStorage.setItem(KNOWN_CASES_KEY,JSON.stringify(currentNumbers));
  archivedCount=allCases.filter(c=>isArchived(c)).length;

  if(newCaseNumbers.size>0){
    const banner=document.getElementById('new-cases-banner');
    banner.style.display='';
    const n=newCaseNumbers.size;
    const word=n===1?'новое дело':n<5?'новых дела':'новых дел';
    document.getElementById('new-cases-text').innerHTML=`<strong>${n} ${word}</strong> с последнего визита`;
  }else{
    document.getElementById('new-cases-banner').style.display='none';
  }

  populateFilterOptions();
  renderStats();applyFilters();renderMeta();renderAnalytics();
  localStorage.setItem(LAST_VISIT_KEY,new Date().toISOString());
}

function isArchived(c){
  if(c.status!=='decided')return false;
  const decisionDate=c.lastEventDate||c.dateReceived;
  if(!decisionDate)return false;
  const d=new Date(decisionDate);if(isNaN(d))return false;
  return(Date.now()-d.getTime())/(1000*60*60*24)>ARCHIVE_DAYS;
}
function isNewCase(c){return newCaseNumbers.has(c.caseNumber);}

/* ========== Populate dynamic filter options ========== */
function populateFilterOptions(){
  const cats=new Set(),courts=new Set();
  allCases.forEach(c=>{if(c.category)cats.add(c.category);if(c.firstInstanceCourt)courts.add(c.firstInstanceCourt);});
  const catSel=document.getElementById('filter-category');
  const courtSel=document.getElementById('filter-court');
  const catVal=catSel.value,courtVal=courtSel.value;
  catSel.innerHTML='<option value="all">Все категории</option>'+[...cats].sort().map(c=>`<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
  courtSel.innerHTML='<option value="all">Все суды</option>'+[...courts].sort().map(c=>`<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
  catSel.value=catVal;courtSel.value=courtVal;
}

/* ========== Stats ========== */
function renderStats(){
  const active=allCases.filter(c=>c.status==='active').length;
  const decided=allCases.filter(c=>c.status==='decided'&&!isArchived(c)).length;
  const w=allCases.filter(c=>getResultFavor(c)==='favorable').length;
  const l=allCases.filter(c=>getResultFavor(c)==='unfavorable').length;
  const decidedTotal=allCases.filter(c=>c.status==='decided').length;

    <div class="stat-card" data-accent="blue"><div class="stat-value">${allCases.length}</div><div class="stat-label">Всего дел</div></div>
    <div class="stat-card" data-accent="gold"><div class="stat-value">${active}</div><div class="stat-label">В производстве</div></div>

  // Secondary chips

  const tp=allCases.filter(c=>c.sberbankRole==='third_party').length;

    <div class="stat-chip"><div class="chip-dot" style="background:var(--blue-500);"></div>Истец: <strong>${p}</strong></div>

  const partial=allCases.filter(c=>c.result==='partial').length;
  const dismissed=allCases.filter(c=>c.result==='dismissed'||c.result==='returned').length;
  if(upheld>0)chips+=`<div class="stat-chip"><div class="chip-dot" style="background:var(--green-500);"></div>Без изменения: <strong>${upheld}</strong></div>`;
  if(reversed>0)chips+=`<div class="stat-chip"><div class="chip-dot" style="background:var(--red-500);"></div>Отменено: <strong>${reversed}</strong></div>`;
  if(partial>0)chips+=`<div class="stat-chip"><div class="chip-dot" style="background:var(--amber-500);"></div>Изменено: <strong>${partial}</strong></div>`;
  if(dismissed>0)chips+=`<div class="stat-chip"><div class="chip-dot" style="background:var(--slate-400);"></div>Снято/Возвращено: <strong>${dismissed}</strong></div>`;
  document.getElementById('stats-secondary').innerHTML=chips;

/* ========== Analytics ========== */
function renderAnalytics(){
  // Category bar chart
  const catCounts={};
  allCases.forEach(c=>{if(c.category)catCounts[c.category]=(catCounts[c.category]||0)+1;});
  const catSorted=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);
  const catMax=catSorted.length>0?catSorted[0][1]:1;
  let catHtml='<div class="analytics-card"><div class="analytics-title">Распределение по категориям</div>';
  catSorted.forEach(([cat,cnt],i)=>{
    const pct=Math.round(cnt/catMax*100);
    const clr=CAT_COLORS[i%CAT_COLORS.length];
    catHtml+=`<div class="cat-bar-row"><span class="cat-bar-label">${escHtml(cat)}</span><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${clr};"></div></div><span class="cat-bar-count">${cnt}</span></div>`;
  });
  catHtml+='</div>';

  // Upcoming hearings
  const today=new Date();today.setHours(0,0,0,0);
  const upcoming=allCases
    .filter(c=>{
      if(c.status!=='active')return false;
      const evText=(c.lastEvent||'').toLowerCase();
      return evText.includes('назначен')||evText.includes('заседан')||evText.includes('рассмотрен');
    })
    .map(c=>{
      const m=(c.lastEvent||'').match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
      let hearingDate=null;
      if(m)hearingDate=new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
      return{...c,hearingDate};
    })
    .filter(c=>c.hearingDate&&c.hearingDate>=today)
    .sort((a,b)=>a.hearingDate-b.hearingDate)
    .slice(0,7);

  let upHtml='<div class="analytics-card"><div class="analytics-title">Ближайшие заседания</div>';
  if(upcoming.length===0){
    upHtml+='<div class="upcoming-empty">Нет предстоящих заседаний</div>';
  }else{
    upHtml+='<div class="upcoming-list">';
    upcoming.forEach(c=>{
      const dateStr=c.hearingDate.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
      const rc=c.sberbankRole==='plaintiff'?'plaintiff':c.sberbankRole==='defendant'?'defendant':'third';
      upHtml+=`<div class="upcoming-item"><span class="upcoming-date">${dateStr}</span><div class="upcoming-info"><span class="upcoming-case">${escHtml(c.caseNumber)}</span> <span class="badge badge-${rc}" style="font-size:9px;padding:1px 5px;">${ROLE_LABELS[c.sberbankRole]||''}</span><br><span style="font-size:11px;color:var(--slate-500);">${escHtml(c.plaintiff)} vs ${escHtml(c.defendant)}</span></div></div>`;
    });
    upHtml+='</div>';
  }
  upHtml+='</div>';

  document.getElementById('analytics-row').innerHTML=catHtml+upHtml;
}

/* ========== Meta / Footer ========== */
function renderMeta(){
  const lastVisit=localStorage.getItem(LAST_VISIT_KEY);
  let metaHtml='Обновлено: '+new Date().toLocaleString('ru-RU');
  if(lastVisit){const lv=new Date(lastVisit);if(!isNaN(lv))metaHtml+='<br><span style="font-size:10px;color:var(--slate-400);">Пред. визит: '+lv.toLocaleString('ru-RU')+'</span>';}
  document.getElementById('meta-info').innerHTML=metaHtml;
  document.getElementById('app-footer').textContent='Данные из GitHub (автообновление ежедневно в 10:00)';
}

/* ========== Filters ========== */
function onSearchInput(){
  const v=document.getElementById('search-input').value;
  document.getElementById('search-clear').classList.toggle('visible',v.length>0);
  applyFilters();
}
function clearSearch(){document.getElementById('search-input').value='';document.getElementById('search-clear').classList.remove('visible');applyFilters();}
function filterNewCases(e){
  if(e.target.closest('.dismiss'))return;
  document.getElementById('filter-status').value='new';
  applyFilters();
}
function dismissNewBanner(e){e.stopPropagation();document.getElementById('new-cases-banner').style.display='none';}

function applyFilters(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const st=document.getElementById('filter-status').value;
  const rl=document.getElementById('filter-role').value;
  const cat=document.getElementById('filter-category').value;
  const court=document.getElementById('filter-court').value;

  filteredCases=allCases.filter(c=>{
    const archived=isArchived(c);
    if(st==='archived'){if(!archived)return false;}
    else if(st==='new'){if(!isNewCase(c))return false;}
    else if(st==='all'){if(archived)return false;}
    else if(st==='active'){if(c.status!=='active')return false;}
    else if(st==='decided'){if(c.status!=='decided'||archived)return false;}
    if(rl!=='all'&&c.sberbankRole!==rl)return false;
    if(cat!=='all'&&c.category!==cat)return false;
    if(court!=='all'&&c.firstInstanceCourt!==court)return false;
    if(q){const h=[c.caseNumber,c.plaintiff,c.defendant,c.category,c.firstInstanceCourt,c.lastEvent,c.notes].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });

  filteredCases.sort((a,b)=>{
    const aNew=isNewCase(a)?0:1,bNew=isNewCase(b)?0:1;
    if(aNew!==bNew)return aNew-bNew;
    let va=a[sortField]||'',vb=b[sortField]||'';
    if(sortField==='dateReceived'||sortField==='nextDate'||sortField==='lastEventDate'){va=new Date(va||'1970-01-01').getTime();vb=new Date(vb||'1970-01-01').getTime();}
    if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase();}
    if(va<vb)return sortDir==='asc'?-1:1;if(va>vb)return sortDir==='asc'?1:-1;return 0;
  });

  renderTable();renderMobileCards();renderCounter();
}

function toggleSort(f){if(sortField===f)sortDir=sortDir==='asc'?'desc':'asc';else{sortField=f;sortDir='desc';}applyFilters();}

/* ========== Counter ========== */
function renderCounter(){
  const archText=archivedCount>0?` · ${archivedCount} в архиве`:'';
  const newText=newCaseNumbers.size>0?` · ${newCaseNumbers.size} новых`:'';
  document.getElementById('table-counter').innerHTML=`Показано <strong>${filteredCases.length}</strong> из <strong>${allCases.length}</strong> дел${newText}${archText}`;
}

/* ========== Table ========== */
const COLS=[
  {k:'_expand',l:'',s:0,w:'36px'},
  {k:'caseNumber',l:'Дело',s:1,w:'120px'},
  {k:'dateReceived',l:'Поступ.',s:1,w:'72px'},
  {k:'firstInstanceCourt',l:'Суд 1 инст.',s:1,w:'150px'},
  {k:'parties',l:'Стороны',s:0},
  {k:'category',l:'Кат. / Роль',s:1,w:'140px'},
  {k:'nextDate',l:'Ближ. дата',s:1,w:'110px'},
  {k:'status',l:'Статус',s:1,w:'90px'},
  {k:'result',l:'Результат',s:1,w:'130px'}
];

function renderTable(){
  document.getElementById('table-head').innerHTML='<tr>'+COLS.map(c=>{
    if(c.k==='_expand')return`<th style="width:${c.w};"></th>`;
    const sorted=sortField===c.k,arrow=sorted?(sortDir==='asc'?'▲':'▼'):'';
    const cls=[sorted?'sorted':'',c.s?'sortable':''].filter(Boolean).join(' ');
    const oc=c.s?`onclick="toggleSort('${c.k}')"`:'';
    const ws=c.w?`style="width:${c.w};"`:'';
    return`<th class="${cls}" ${oc} ${ws}>${c.l}${arrow?`<span class="sort-icon">${arrow}</span>`:''}</th>`;
  }).join('')+'</tr>';

  if(!filteredCases.length){
    document.getElementById('table-body').innerHTML=`<tr><td colspan="${COLS.length}" class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><p>Нет дел, соответствующих фильтрам</p></td></tr>`;
    return;
  }

  let html='';
  filteredCases.forEach((c,idx)=>{
    const rc=c.sberbankRole==='plaintiff'?'plaintiff':c.sberbankRole==='defendant'?'defendant':'third';
    const sc=c.status==='active'?'active':'decided';
    const isNew=isNewCase(c);
    const expanded=expandedRows.has(c.caseNumber);
    const rowClass=[isNew?'row-new':''].filter(Boolean).join(' ');

    // Highlight Sberbank in parties
    const plaintiffHtml=isSberbank(c.plaintiff)?`<span class="party-sberbank">${escHtml(c.plaintiff)}</span>`:escHtml(c.plaintiff);
    const defendantHtml=isSberbank(c.defendant)?`<span class="party-sberbank">${escHtml(c.defendant)}</span>`:escHtml(c.defendant);

    const resultIcon=RESULT_ICONS[c.result]||'';
    const linkIcon=c.link?'<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="var(--slate-400)" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>':'';
    const newBadge=isNew?'<span class="badge-new">Новое</span>':'';
    const archived=isArchived(c)?'<span class="badge-archived">Архив</span>':'';
    const eventText=c.lastEvent||'';

    // Result badge with dynamic color
    const resultBadgeCls=getResultBadgeClass(c);
    const favor=getResultFavor(c);
    const favorIcon=favor==='favorable'?'<span style="color:var(--green-500);">✓</span>':favor==='unfavorable'?'<span style="color:var(--red-500);">✕</span>':`<span class="badge-icon">${resultIcon}</span>`;

    // Act publication info
    let actHtml='';
    if(c.status==='decided'||c.result!=='pending'){
      if(c.hasPublishedActs){
        const actDateStr=c.actDate?formatDate(c.actDate):'';
        actHtml=`<span class="badge-act">Акт${actDateStr?' '+actDateStr:' опубл.'}</span>`;
      }else if(c.result&&c.result!=='pending'){
        actHtml='<span class="badge-act-no">Акт не опубл.</span>';
      }
    }

    // Next date
    let nextDateHtml='—';
    if(c.nextDate){
      const isWarn=c.nextDateLabel&&(c.nextDateLabel.includes('Без движения')||c.nextDateLabel.includes('Отложено'));
      if(isWarn){
        nextDateHtml=`<div class="next-date-warn">${escHtml(c.nextDateLabel)}</div><div class="next-date-val" style="font-size:11px;">${formatDate(c.nextDate)}</div>`;
      }else{
        nextDateHtml=`<div class="next-date-val">${formatDate(c.nextDate)}</div><div class="next-date-label">${escHtml(c.nextDateLabel||'')}</div>`;
      }
    }else if(c.lastEventDate&&c.status==='decided'){
      nextDateHtml=`<div class="next-date-val" style="color:var(--slate-400);font-size:11px;">${formatDate(c.lastEventDate)}</div><div class="next-date-label">Рассмотрено</div>`;
    }

    html+=`<tr class="${rowClass}" data-idx="${idx}">
      <td><button class="expand-btn ${expanded?'open':''}" onclick="toggleExpand('${escHtml(c.caseNumber)}',event)">${expanded?'−':'+'}</button></td>
      <td><div class="case-number">${escHtml(c.caseNumber)} ${linkIcon} ${newBadge} ${archived}</div></td>
      <td>${formatDate(c.dateReceived)}</td>
      <td><div class="court-cell">${escHtml(c.firstInstanceCourt)}</div></td>
      <td><div class="parties-col"><span><span class="party-tag">И:</span>${plaintiffHtml}</span><span><span class="party-tag">О:</span>${defendantHtml}</span></div></td>
      <td><div class="cat-role-cell"><span class="badge badge-cat">${escHtml(c.category)}</span><span class="badge badge-${rc}">${ROLE_LABELS[c.sberbankRole]||c.sberbankRole}</span></div></td>
      <td>${nextDateHtml}</td>
      <td><span class="badge badge-${sc}">${STATUS_LABELS[c.status]||c.status}</span></td>
      <td><div class="result-cell"><span class="badge ${resultBadgeCls}">${favorIcon} ${RESULT_LABELS[c.result]||c.result||'—'}</span>${actHtml}</div></td>
    </tr>`;

    // Detail row
    html+=`<tr class="detail-row ${expanded?'open':''}" id="detail-${escHtml(c.caseNumber)}">
      <td colspan="${COLS.length}">
        <div class="detail-content">
          <div class="detail-block"><div class="detail-block-title">Последнее событие</div>${escHtml(eventText)||'—'}${c.lastEventDate?'<br><span style="color:var(--slate-400);font-size:11px;">'+formatDate(c.lastEventDate)+'</span>':''}</div>
          ${c.resultRaw&&c.result!=='pending'?`<div class="detail-block"><div class="detail-block-title">Решение суда (полный текст)</div>${escHtml(c.resultRaw)}</div>`:''}
          ${c.appellant?`<div class="detail-block"><div class="detail-block-title">Апеллянт</div>${c.appellant==='bank'?'Банк (Сбербанк)':'Другая сторона'}</div>`:''}
          ${c.notes?`<div class="detail-block"><div class="detail-block-title">Заметки</div>${escHtml(c.notes)}</div>`:''}
          <div class="detail-block">
            ${c.link?`<a class="detail-link" href="${escHtml(c.link)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Открыть на сайте суда</a>`:''}
          </div>
        </div>
      </td>
    </tr>`;
  });
  document.getElementById('table-body').innerHTML=html;
}

function toggleExpand(caseNumber,e){
  e.stopPropagation();
  if(expandedRows.has(caseNumber))expandedRows.delete(caseNumber);
  else expandedRows.add(caseNumber);
  renderTable();
}

/* ========== Mobile Cards ========== */
function renderMobileCards(){
  if(!filteredCases.length){
    document.getElementById('mobile-cards').innerHTML='<div class="empty-state"><p>Нет дел, соответствующих фильтрам</p></div>';
    return;
  }
  document.getElementById('mobile-cards').innerHTML=filteredCases.map(c=>{
    const isNew=isNewCase(c);
    const rc=c.sberbankRole==='plaintiff'?'plaintiff':c.sberbankRole==='defendant'?'defendant':'third';
    const resultIcon=RESULT_ICONS[c.result]||'';
    const resultBadgeCls=getResultBadgeClass(c);
    const favor=getResultFavor(c);
    const favorIcon=favor==='favorable'?'✓':favor==='unfavorable'?'✕':resultIcon;
    let actInfo='';
    if(c.hasPublishedActs){actInfo=`<span class="badge-act">Акт${c.actDate?' '+formatDate(c.actDate):' опубл.'}</span>`;}
    else if(c.result&&c.result!=='pending'){actInfo='<span class="badge-act-no">Акт не опубл.</span>';}
    let nextDateInfo='';
    if(c.nextDate){nextDateInfo=`<span style="font-family:var(--font-mono);font-size:11px;font-weight:600;">${formatDate(c.nextDate)}</span> <span style="font-size:10px;color:var(--slate-400);">${escHtml(c.nextDateLabel||'')}</span>`;}
    return`<div class="mobile-card ${isNew?'card-new':''}" data-role="${c.sberbankRole}">
      <div class="mc-header">
        <div><span class="mc-case">${escHtml(c.caseNumber)}</span>${isNew?' <span class="badge-new">Новое</span>':''}</div>
        <span class="badge badge-${c.status==='active'?'active':'decided'}">${STATUS_LABELS[c.status]||c.status}</span>
      </div>
      <div style="font-size:11px;color:var(--slate-500);margin-bottom:6px;">${escHtml(c.firstInstanceCourt)}</div>
      <div class="mc-parties">
        <span class="party-tag">И:</span>${isSberbank(c.plaintiff)?'<strong class="party-sberbank">'+escHtml(c.plaintiff)+'</strong>':escHtml(c.plaintiff)}<br>
        <span class="party-tag">О:</span>${isSberbank(c.defendant)?'<strong class="party-sberbank">'+escHtml(c.defendant)+'</strong>':escHtml(c.defendant)}
      </div>
      <div class="mc-row">
        <span class="badge badge-cat">${escHtml(c.category)}</span>
        <span class="badge badge-${rc}">${ROLE_LABELS[c.sberbankRole]||''}</span>
        <span class="badge ${resultBadgeCls}">${favorIcon} ${RESULT_LABELS[c.result]||'—'}</span>
      </div>
      ${nextDateInfo?`<div style="margin-top:4px;font-size:12px;">${nextDateInfo}</div>`:''}
      ${c.lastEvent?`<div class="mc-event">${escHtml(c.lastEvent)}</div>`:''}
      ${actInfo?`<div style="margin-top:4px;">${actInfo}</div>`:''}
      <div class="mc-meta">
        <span>${formatDate(c.dateReceived)}</span>
        ${c.link?`<a class="mc-link" href="${escHtml(c.link)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Сайт суда</a>`:''}
      </div>
    </div>`}).join('');
}

/* ========== Export ========== */
function exportCSV(){
  const hd=['Номер дела','Дата поступления','Истец','Ответчик','Категория','Суд 1 инстанции','Роль банка','Статус','Последнее событие','Дата события','Акт опубликован','Дата публикации акта','Результат','Результат (полный)','Апеллянт','Ближ. дата','Тип даты','Ссылка','Заметки'];
  const rs=filteredCases.map(c=>[c.caseNumber,formatDate(c.dateReceived),c.plaintiff,c.defendant,c.category,c.firstInstanceCourt,ROLE_LABELS[c.sberbankRole]||'',STATUS_LABELS[c.status]||'',c.lastEvent,formatDate(c.lastEventDate),c.hasPublishedActs?'Да':'Нет',c.actDate?formatDate(c.actDate):'',RESULT_LABELS[c.result]||'',c.resultRaw||'',c.appellant==='bank'?'Банк':c.appellant==='other'?'Другая сторона':'',formatDate(c.nextDate),c.nextDateLabel||'',c.link,c.notes]);
  const csv=[hd,...rs].map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sberbank_cases_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

/* ========== Boot ========== */
window.addEventListener('DOMContentLoaded',()=>{init();});
